[build]
  command = "pnpm build"
  functions = "netlify/functions"
  publish = "dist/public"

[dev]
  command = "pnpm dev"
  port = 3000

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[env]
  [env.production]
    [env.production.context.production]
      environment = { DISCORD_WEBHOOK_URL = "" }
